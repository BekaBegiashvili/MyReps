<div class="auth-container">
  <h2>შესვლა</h2>

  <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" *ngIf="!showRecovery">
    <div class="form-group">
      <label>ელ-ფოსტა</label>
      <input type="email" formControlName="email" placeholder="email@example.com" />
    </div>
    <div class="form-group">
      <label>პაროლი</label>
      <div class="field-wrap">
        <div class="input-wrapper">
          <input
            [type]="showPassword ? 'text' : 'password'"
            formControlName="password"
            placeholder="მინიმუმ 6 სიმბოლო"
            [class.invalid]="
              loginForm.get('password')?.invalid && loginForm.get('password')?.touched
            "
          />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            {{ showPassword ? '︶' : '👁' }}
          </button>
        </div>
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <span class="field-error">მინიმუმ 6 სიმბოლო</span>
        }
      </div>
    </div>
    <button type="submit" [disabled]="loginForm.invalid">შესვლა</button>
    <p class="error" *ngIf="error">{{ error }}</p>
  </form>

  <div *ngIf="showRecovery">
    <h3>პაროლის აღდგენა</h3>
    <div class="form-group">
      <input type="email" [(ngModel)]="recoveryEmail" placeholder="შეიყვანე ელ-ფოსტა" />
    </div>
    <button (click)="onRecovery()">გაგზავნა</button>
    <p class="success" *ngIf="success">{{ success }}</p>
    <p class="error" *ngIf="error">{{ error }}</p>
  </div>

  <p (click)="showRecovery = !showRecovery" class="toggle-recovery">
    {{ showRecovery ? 'უკან დაბრუნება' : 'პაროლი დამავიწყდა?' }}
  </p>

  <p>არ გაქვს ანგარიში? <a routerLink="/auth/register">დარეგისტრირდი</a></p>
</div>
